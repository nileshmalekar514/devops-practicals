apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-p1-deploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-p1
  template:
    metadata:
      labels:
        app: flask-p1
    spec:
      containers:
      - name: flask-app
        image: flask-practical1:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
